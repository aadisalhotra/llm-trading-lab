name: Intraday Trading Pipeline

on:
  schedule:
    # Intraday ticks: every 15 minutes from 13:30 to 20:00 UTC, Mon-Fri.
    # EDT (UTC-4): 09:30–16:00 ET. EST (UTC-5): 08:30–15:00 ET.
    # The window is tight enough that no tick fires after 16:00 ET in
    # either DST regime. The pipeline double-checks via is_market_open_now().
    - cron: "*/15 13-19 * * 1-5"
    - cron: "0 20 * * 1-5"
    # End-of-day wrap-up: writes the EOD perf row, generates the daily
    # report, and sends the daily summary alert. Fires at 21:00 UTC =
    # 17:00 ET in DST / 16:00 ET in standard time — safely after close.
    # This run does NOT execute trades.
    - cron: "0 21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: intraday | end-of-day"
        required: false
        default: "intraday"
        type: choice
        options:
          - intraday
          - end-of-day
      force:
        description: "Bypass market-open check"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

# Stop overlapping ticks from racing to commit data — if a previous run is
# still going, the new one waits its turn.
concurrency:
  group: intraday-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve run mode
        id: mode
        run: |
          # The 21:00 UTC cron is the EOD wrap-up; everything else is intraday.
          # workflow_dispatch overrides via the `mode` input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "force=${{ github.event.inputs.force }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 21 * * 1-5" ]; then
            echo "mode=end-of-day" >> $GITHUB_OUTPUT
            echo "force=false" >> $GITHUB_OUTPUT
          else
            echo "mode=intraday" >> $GITHUB_OUTPUT
            echo "force=false" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          # News intelligence (all optional — pipeline runs without them)
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          FORCE="${{ steps.mode.outputs.force }}"
          ARGS=""
          if [ "$MODE" = "end-of-day" ]; then
            ARGS="--end-of-day"
          else
            ARGS="--intraday"
          fi
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running: python -m src.pipeline $ARGS"
          python -m src.pipeline $ARGS

      - name: Commit + push updated data
        run: |
          git config user.name "llm-trading-lab-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true
          git add data/ logs/ reports/daily/ docs/MODEL_CHANGELOG.md || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            MODE="${{ steps.mode.outputs.mode }}"
            git commit -m "${MODE} tick $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          fi

  # Self-perpetuating chain: after each successful intraday tick, if we're
  # still inside market hours, sleep until the next 15-minute boundary and
  # dispatch intraday.yml again. This decouples us from GitHub's cron
  # scheduler entirely — even if */15 is throttled, the chain keeps ticking
  # once the watchdog kicks it off at 13:00 UTC.
  chain:
    needs: run
    runs-on: ubuntu-latest
    if: success() && github.event.schedule != '0 21 * * 1-5' && github.event.inputs.mode != 'end-of-day'
    steps:
      - name: Sleep to next 15-minute boundary, then dispatch next tick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          NOW_MIN=$(date -u +%M)
          NOW_SEC=$(date -u +%S)
          NOW_HOUR=$(date -u +%H)
          NOW_DOW=$(date -u +%u)  # 1=Mon..7=Sun

          # Stop chain on weekends (shouldn't happen, but be safe)
          if [ "$NOW_DOW" -gt 5 ]; then
            echo "Weekend — stopping chain"
            exit 0
          fi

          # Stop chain after 19:45 UTC: the 20:00 cron + 21:00 EOD cover the rest.
          # (Those fire on their own reliably because they aren't */15.)
          if [ "$NOW_HOUR" -ge 20 ]; then
            echo "Past 20:00 UTC — stopping chain (EOD crons take over)"
            exit 0
          fi

          # Seconds until next 15-min boundary + 30s buffer so the dispatch
          # lands after the wall-clock minute rolls over.
          MIN_MOD=$(( 10#$NOW_MIN % 15 ))
          WAIT=$(( (15 - MIN_MOD) * 60 - 10#$NOW_SEC + 30 ))
          if [ "$WAIT" -lt 60 ]; then
            WAIT=$(( WAIT + 900 ))
          fi
          echo "Sleeping ${WAIT}s until next tick..."
          sleep "$WAIT"

          # Re-check hour after sleep in case we crossed 20:00 UTC
          POST_HOUR=$(date -u +%H)
          if [ "$POST_HOUR" -ge 20 ]; then
            echo "Crossed 20:00 UTC during sleep — stopping chain"
            exit 0
          fi

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/intraday.yml/dispatches" \
            -d '{"ref":"main","inputs":{"mode":"intraday","force":"false"}}'
          echo "Dispatched next intraday tick"

  pages:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      # Ensure we have the latest main (run job just pushed new data)
      - run: git pull origin main
      - name: Copy data into dashboard artifact
        run: |
          mkdir -p dashboard/data
          cp data/dashboard.json dashboard/data/dashboard.json
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
