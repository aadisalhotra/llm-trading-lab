name: Intraday Trading Pipeline

on:
  schedule:
    # Intraday ticks: every 30 minutes from 13:30 to 20:00 UTC, Mon-Fri.
    # EDT (UTC-4): 09:30–16:00 ET. EST (UTC-5): 08:30–15:00 ET.
    # The window is tight enough that no tick fires after 16:00 ET in
    # either DST regime. The pipeline double-checks via is_market_open_now().
    # This cron is a belt-and-suspenders backup — the primary trigger is
    # the self-perpetuating chain job below.
    - cron: "*/30 13-19 * * 1-5"
    - cron: "0 20 * * 1-5"
    # End-of-day wrap-up: writes the EOD perf row, generates the daily
    # report, and sends the daily summary alert. Fires at 21:00 UTC =
    # 17:00 ET in DST / 16:00 ET in standard time — safely after close.
    # This run does NOT execute trades.
    - cron: "0 21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: intraday | end-of-day"
        required: false
        default: "intraday"
        type: choice
        options:
          - intraday
          - end-of-day
      force:
        description: "Bypass market-open check"
        required: false
        default: "false"
  # External kick from cron-job.org (or any other cron-as-a-service).
  # POST to /repos/{owner}/{repo}/dispatches with
  #   {"event_type": "market-open-kick"}
  # at 13:00 UTC Mon-Fri to start the daily chain. GitHub's own cron
  # often delays the first tick of the day by 10-20 minutes; an
  # external trigger lands on time, then our self-chain job handles
  # every subsequent tick until close.
  repository_dispatch:
    types: [market-open-kick]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

# Stop overlapping ticks from racing to commit data — if a previous run is
# still going, the new one waits its turn.
concurrency:
  group: intraday-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve run mode
        id: mode
        run: |
          # The 21:00 UTC cron is the EOD wrap-up; everything else is intraday.
          # workflow_dispatch overrides via the `mode` input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "force=${{ github.event.inputs.force }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 21 * * 1-5" ]; then
            echo "mode=end-of-day" >> $GITHUB_OUTPUT
            echo "force=false" >> $GITHUB_OUTPUT
          else
            echo "mode=intraday" >> $GITHUB_OUTPUT
            echo "force=false" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          # News intelligence (all optional — pipeline runs without them)
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          # Email alerting (Gmail SMTP) — recipients live in settings.json
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          FORCE="${{ steps.mode.outputs.force }}"
          ARGS=""
          if [ "$MODE" = "end-of-day" ]; then
            ARGS="--end-of-day"
          else
            ARGS="--intraday"
          fi
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running: python -m src.pipeline $ARGS"
          python -m src.pipeline $ARGS

      - name: Commit + push updated data
        run: |
          git config user.name "llm-trading-lab-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true
          git add data/ logs/ reports/daily/ docs/MODEL_CHANGELOG.md || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            MODE="${{ steps.mode.outputs.mode }}"
            git commit -m "${MODE} tick $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          fi

  # Self-perpetuating chain. After each successful intraday tick:
  #   * If still inside market hours (< 20:00 UTC), sleep to the next
  #     30-minute boundary (:00 or :30) and dispatch intraday.yml again.
  #   * If market has closed (>= 20:00 UTC EDT), sleep until ~21:05 UTC
  #     (giving close prices time to settle) and dispatch the EOD
  #     wrap-up run with mode=end-of-day.
  # The chain is now the PRIMARY trigger for both intraday ticks AND the
  # EOD wrap-up. The `0 21 * * 1-5` cron on the workflow is retained as a
  # belt-and-suspenders backup for the rare case where this chain job
  # itself fails — log_daily_snapshot is idempotent on date so a
  # double-fire writes exactly one row per day.
  chain:
    needs: run
    runs-on: ubuntu-latest
    if: success() && github.event.schedule != '0 21 * * 1-5' && github.event.inputs.mode != 'end-of-day'
    steps:
      - name: Chain next tick (intraday or EOD)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          dispatch_intraday() {
            curl -sS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/intraday.yml/dispatches" \
              -d '{"ref":"main","inputs":{"mode":"intraday","force":"false"}}'
            echo "Dispatched next intraday tick"
          }

          dispatch_eod() {
            # Wait until 21:05 UTC (1h 5m after EDT market close) so
            # prices settle, then dispatch mode=end-of-day. If we are
            # already past 21:05, dispatch after a 30s safety buffer.
            local h m s now target wait
            h=$(date -u +%H); m=$(date -u +%M); s=$(date -u +%S)
            now=$(( 10#$h * 3600 + 10#$m * 60 + 10#$s ))
            target=$(( 21 * 3600 + 5 * 60 ))
            wait=$(( target - now ))
            if [ "$wait" -lt 30 ]; then
              wait=30
            fi
            echo "Market closed — waiting ${wait}s before EOD dispatch..."
            sleep "$wait"
            curl -sS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/intraday.yml/dispatches" \
              -d '{"ref":"main","inputs":{"mode":"end-of-day","force":"false"}}'
            echo "Dispatched end-of-day run"
          }

          NOW_MIN=$(date -u +%M)
          NOW_SEC=$(date -u +%S)
          NOW_HOUR=$(date -u +%H)
          NOW_DOW=$(date -u +%u)  # 1=Mon..7=Sun

          # Stop chain on weekends (shouldn't happen, but be safe)
          if [ "$NOW_DOW" -gt 5 ]; then
            echo "Weekend — stopping chain"
            exit 0
          fi

          # Post-close: chain to the EOD wrap-up instead of another tick.
          # The EOD run itself won't re-trigger this chain job because the
          # top-level `if:` excludes mode=end-of-day.
          if [ "$NOW_HOUR" -ge 20 ]; then
            dispatch_eod
            exit 0
          fi

          # Intraday path: sleep to the next 30-minute boundary (:00 or
          # :30) + 30s buffer so the dispatch lands after the wall-clock
          # minute rolls.
          MIN_MOD=$(( 10#$NOW_MIN % 30 ))
          WAIT=$(( (30 - MIN_MOD) * 60 - 10#$NOW_SEC + 30 ))
          if [ "$WAIT" -lt 60 ]; then
            WAIT=$(( WAIT + 1800 ))
          fi
          echo "Sleeping ${WAIT}s until next tick..."
          sleep "$WAIT"

          # If we crossed 20:00 UTC during the sleep, chain to EOD
          # instead of dispatching another intraday.
          POST_HOUR=$(date -u +%H)
          if [ "$POST_HOUR" -ge 20 ]; then
            echo "Crossed 20:00 UTC during sleep — chaining to EOD"
            dispatch_eod
            exit 0
          fi

          dispatch_intraday

  pages:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      # Ensure we have the latest main (run job just pushed new data)
      - run: git pull origin main
      - name: Copy data into dashboard artifact
        run: |
          mkdir -p dashboard/data
          cp data/dashboard.json dashboard/data/dashboard.json
          # Stamp asset version into index.html so browsers can't serve a
          # cached shell that references stale JS/CSS. The JSON itself is
          # already cache-busted at fetch time inside app.js.
          VERSION="$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          sed -i "s/__ASSET_VERSION__/${VERSION}/g" dashboard/index.html
          echo "Asset version: ${VERSION}"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # If any upstream job fails (pipeline run, self-chain, or Pages deploy),
  # send a single [ALERT] email so a hard failure the in-process alerter
  # can't self-report still reaches the inbox.
  notify-failure:
    needs: [run, chain, pages]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Send failure email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RUN_MODE: ${{ needs.run.result == 'failure' && 'pipeline run' || 'workflow' }}
          FAILED_CONTEXT: "run=${{ needs.run.result }} chain=${{ needs.chain.result }} pages=${{ needs.pages.result }}"
        run: python scripts/notify_failure.py
