name: Daily Trading Pipeline

on:
  schedule:
    # 14:30 UTC = 10:30 ET (1 hour after market open). Mon-Fri only.
    - cron: "30 14 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Force run even if market is closed"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python -m src.pipeline --force
          else
            python -m src.pipeline
          fi

      - name: Commit + push updated data
        run: |
          git config user.name "llm-trading-lab-bot"
          git config user.email "actions@github.com"
          git add data/ logs/ reports/daily/ docs/MODEL_CHANGELOG.md || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "daily run $(date -u +%Y-%m-%d)"
            git push
          fi

  pages:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
